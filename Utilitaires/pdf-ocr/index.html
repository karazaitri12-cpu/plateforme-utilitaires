<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF OCR | Dr KARA-ZAITRI</title>
    
    <!-- Bibliothèques externes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.1.1/dist/tesseract.min.js"></script>
    
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    </script>
    
    <style>
        :root {
            --primary: #1a3a5c;
            --primary-light: #345a7a;
            --primary-dark: #0d2538;
            --text: #37474f;
            --text-light: #607d8b;
            --border: #cfd8dc;
            --bg-page: #f4f7f9;
            --bg-card: #ffffff;
            --bg-input: #f8f9fa;
            --success: #2e7d32;
            --warning: #ed6c02;
            --error: #c62828;
            --premium: #C9A961;
            --highlight: #ffeb3b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: var(--bg-page);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }

        .nav-bar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: #fff;
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
        }
        .back-link {
            text-decoration: none;
            color: var(--primary);
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ocr-wrapper {
            max-width: 1000px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .ocr-header {
            text-align: center;
            margin-bottom: 24px;
            padding: 30px;
            background: var(--primary);
            border-radius: 12px;
            color: #fff;
            position: relative;
        }
        .ocr-header h1 {
            font-size: 24px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .premium-badge {
            position: absolute;
            top: 15px;
            right: 20px;
            color: var(--premium);
            font-size: 24px;
        }

        #dropzone {
            border: 3px dashed var(--border);
            border-radius: 12px;
            padding: 50px 20px;
            text-align: center;
            background: var(--bg-card);
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 20px;
        }
        #dropzone:hover, #dropzone.dragover {
            border-color: var(--primary);
            background: #e3f2fd;
        }

        .file-info {
            background: var(--bg-input);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
        }

        #button-container {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 20px;
            padding: 12px;
            background: var(--bg-card);
            border-radius: 8px;
            border: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: opacity 0.2s;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-success { background: var(--success); color: #fff; }
        .btn-danger { background: var(--error); color: #fff; }
        .btn-secondary { background: var(--text-light); color: #fff; }

        #progress-bar {
            display: none;
            height: 10px;
            background: var(--border);
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
        }
        #progress {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s;
        }

        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
            overflow-x: auto;
        }
        .tab-button {
            padding: 8px 15px;
            background: #ddd;
            border: none;
            cursor: pointer;
            border-radius: 5px 5px 0 0;
        }
        .tab-button.active {
            background: var(--primary);
            color: white;
        }
        .tab-content {
            display: none;
            background: white;
            border: 1px solid var(--border);
            padding: 20px;
            min-height: 200px;
            white-space: pre-wrap;
            font-family: monospace;
        }
        .tab-content.active { display: block; }

        #error-message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .error { background: #fdecea; color: var(--error); border: 1px solid #f5c6cb; }
        .success { background: #edf7ed; color: var(--success); border: 1px solid #c3e6cb; }

        #loading { display: none; text-align: center; margin: 20px; }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .tool-footer {
            margin-top: 40px;
            text-align: center;
            font-size: 12px;
            color: var(--text-light);
            padding-bottom: 30px;
        }
        .disclaimer {
            background: #fff3cd;
            padding: 15px;
            border-radius: 6px;
            margin-top: 10px;
            color: #856404;
        }
    </style>
</head>
<body>

<nav class="nav-bar">
    <a href="https://karazaitri12-cpu.github.io/plateforme-utilitaires/" class="back-link">← Retour aux Utilitaires</a>
</nav>

<div class="ocr-wrapper">
    <header class="ocr-header">
        <span class="premium-badge">★</span>
        <h1><i class="fa fa-file-pdf"></i> PDF OCR</h1>
        <p>Conversion locale haute précision (Tesseract.js)</p>
    </header>

    <div id="dropzone">
        <i class="fas fa-cloud-upload-alt" style="font-size: 2em; display: block; margin-bottom: 10px;"></i>
        Glissez-déposez un PDF ici ou cliquez pour sélectionner
    </div>

    <div class="file-info" id="file-info">
        <strong>Fichier :</strong> <span id="file-path"></span> | <strong>Taille :</strong> <span id="file-size"></span>
    </div>

    <div id="button-container">
        <div style="display: flex; gap: 8px; flex-wrap: wrap;">
            <button id="convert-btn" class="btn btn-primary"><i class="fas fa-sync-alt"></i> Convertir tout</button>
            <button id="stop-btn" class="btn btn-danger" style="display:none;"><i class="fas fa-stop"></i> Arrêter</button>
            <button id="copy-btn" class="btn btn-success" style="display:none;"><i class="fas fa-copy"></i> Copier</button>
            <button id="export-btn" class="btn btn-success" style="display:none;"><i class="fas fa-file-download"></i> TXT</button>
        </div>
        <button id="reset-btn" class="btn btn-danger"><i class="fas fa-trash"></i> Reset</button>
    </div>

    <div id="page-count" style="text-align: center; margin-bottom: 10px; font-weight: bold;"></div>

    <div id="error-message"></div>

    <div id="loading">
        <div class="spinner"></div>
        <p id="loading-text" style="margin-top: 10px;">Initialisation...</p>
    </div>

    <div id="progress-bar"><div id="progress"></div></div>

    <div id="tabs" class="tabs"></div>
    <div id="tab-contents"></div>

    <footer class="tool-footer">
        <p>Dr KARA-ZAITRI M.A © 2026</p>
        <div class="disclaimer">
            <strong>Usage privé :</strong> Le traitement est effectué 100% localement dans votre navigateur.
        </div>
    </footer>
</div>

<script>
    let pdfFile = null;
    let stopConversion = false;
    let totalPages = 0;

    const elements = {
        dropzone: document.getElementById('dropzone'),
        convertBtn: document.getElementById('convert-btn'),
        stopBtn: document.getElementById('stop-btn'),
        resetBtn: document.getElementById('reset-btn'),
        copyBtn: document.getElementById('copy-btn'),
        exportBtn: document.getElementById('export-btn'),
        fileInfo: document.getElementById('file-info'),
        filePath: document.getElementById('file-path'),
        fileSize: document.getElementById('file-size'),
        loading: document.getElementById('loading'),
        loadingText: document.getElementById('loading-text'),
        progress: document.getElementById('progress'),
        progressBar: document.getElementById('progress-bar'),
        tabs: document.getElementById('tabs'),
        tabContents: document.getElementById('tab-contents'),
        errorMsg: document.getElementById('error-message'),
        pageCount: document.getElementById('page-count')
    };

    // Gestion Fichiers
    elements.dropzone.onclick = () => {
        let input = document.createElement('input');
        input.type = 'file';
        input.accept = 'application/pdf';
        input.onchange = e => handleFile(e.target.files[0]);
        input.click();
    };

    elements.dropzone.ondragover = e => { e.preventDefault(); elements.dropzone.classList.add('dragover'); };
    elements.dropzone.ondragleave = () => elements.dropzone.classList.remove('dragover');
    elements.dropzone.ondrop = e => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); };

    async function handleFile(file) {
        if (!file || file.type !== 'application/pdf') {
            showMsg("Veuillez choisir un fichier PDF valide.", "error");
            return;
        }
        pdfFile = file;
        elements.fileInfo.style.display = 'block';
        elements.filePath.textContent = file.name;
        elements.fileSize.textContent = (file.size / 1024 / 1024).toFixed(2) + " MB";
        
        const loadingTask = pdfjsLib.getDocument(URL.createObjectURL(file));
        const pdf = await loadingTask.promise;
        totalPages = pdf.numPages;
        elements.pageCount.textContent = totalPages + " page(s) détectée(s)";
    }

    // OCR
    elements.convertBtn.onclick = async () => {
        if (!pdfFile) return showMsg("Sélectionnez un PDF", "error");
        
        resetUI();
        stopConversion = false;
        elements.convertBtn.disabled = true;
        elements.stopBtn.style.display = 'inline-flex';
        elements.loading.style.display = 'block';
        elements.progressBar.style.display = 'block';

        const arrayBuffer = await pdfFile.arrayBuffer();
        const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;

        for (let i = 1; i <= totalPages; i++) {
            if (stopConversion) break;
            elements.loadingText.textContent = `Traitement Page ${i} / ${totalPages}...`;
            
            const page = await pdf.getPage(i);
            const text = await performOCR(page);
            
            addTabPage(i, text);
            elements.progress.style.width = (i / totalPages * 100) + "%";
        }

        elements.loading.style.display = 'none';
        elements.convertBtn.disabled = false;
        elements.stopBtn.style.display = 'none';
        elements.copyBtn.style.display = 'inline-flex';
        elements.exportBtn.style.display = 'inline-flex';
        showMsg("Conversion terminée avec succès !", "success");
    };

    async function performOCR(page) {
        const viewport = page.getViewport({ scale: 2.0 });
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        await page.render({ canvasContext: context, viewport }).promise;

        const { data: { text } } = await Tesseract.recognize(canvas, 'fra');
        return text;
    }

    function addTabPage(num, text) {
        const btn = document.createElement('button');
        btn.className = 'tab-button' + (num === 1 ? ' active' : '');
        btn.textContent = "Page " + num;
        btn.onclick = () => switchTab(num);
        elements.tabs.appendChild(btn);

        const content = document.createElement('div');
        content.id = 'tab-' + num;
        content.className = 'tab-content' + (num === 1 ? ' active' : '');
        content.textContent = text;
        elements.tabContents.appendChild(content);
    }

    function switchTab(num) {
        document.querySelectorAll('.tab-button').forEach((b, i) => b.classList.toggle('active', i === num - 1));
        document.querySelectorAll('.tab-content').forEach((c, i) => c.classList.toggle('active', i === num - 1));
    }

    elements.stopBtn.onclick = () => { stopConversion = true; };

    elements.resetBtn.onclick = () => location.reload();

    elements.copyBtn.onclick = () => {
        let fullText = "";
        document.querySelectorAll('.tab-content').forEach(c => fullText += c.textContent + "\n\n");
        navigator.clipboard.writeText(fullText);
        alert("Texte copié !");
    };

    elements.exportBtn.onclick = () => {
        let fullText = "";
        document.querySelectorAll('.tab-content').forEach(c => fullText += c.textContent + "\n\n");
        const blob = new Blob([fullText], {type: 'text/plain'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "ocr_resultat.txt";
        a.click();
    };

    function showMsg(m, type) {
        elements.errorMsg.textContent = m;
        elements.errorMsg.className = type;
        elements.errorMsg.style.display = 'block';
    }

    function resetUI() {
        elements.tabs.innerHTML = "";
        elements.tabContents.innerHTML = "";
        elements.errorMsg.style.display = 'none';
        elements.progress.style.width = "0%";
    }
</script>

</body>
</html>
