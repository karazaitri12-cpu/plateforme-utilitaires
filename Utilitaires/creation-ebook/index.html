<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Générateur de cours — .docx</title>

<script type="module">
  import * as docx from 'https://cdn.jsdelivr.net/npm/docx@9.5.3/+esm';
  window.docx = docx;
  window._docxReady = true;
  document.dispatchEvent(new Event('docx-ready'));
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@300;400;600;700&display=swap');

:root {
  --ink: #0f1923; --ink2: #2d3f50; --muted: #6b7f91; --line: #dde4ec;
  --bg: #f5f7fa; --card: #ffffff; --accent: #1a4e8c; --accent2: #2563b8;
  --red: #f28282; --red-bg: #fdf0f0; --green-bg: #0e7240; --green-light: #86efac;
  --radius: 10px; --shadow: 0 2px 20px rgba(15,25,35,.09);
  --font-ui: 'Source Sans 3', sans-serif;
  --font-serif: 'Playfair Display', serif;
  --premium: #C9A961;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ==========================================
   SYSTÈME DE VERROUILLAGE PREMIUM
   ========================================== */
#premium-lock {
  display: none; /* Masqué par défaut */
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(13, 45, 82, 0.98); 
  z-index: 10000;
  backdrop-filter: blur(10px);
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: #fff;
  text-align: center;
  padding: 20px;
}

.lock-card {
  background: #fff;
  padding: 40px;
  border-radius: 16px;
  max-width: 500px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  color: #333;
}

.lock-card h2 { color: var(--accent); margin: 15px 0; font-size: 1.6rem; font-family: var(--font-ui); }
.lock-card p { font-size: 1.1rem; margin-bottom: 30px; color: #5a6b7c; line-height: 1.6; }

.btn-upgrade {
  background: linear-gradient(180deg, #fcf6ba 0%, #d4af37 100%);
  color: #2a1f00 !important;
  padding: 18px 35px;
  text-decoration: none;
  font-weight: 800;
  border-radius: 8px;
  display: inline-block;
  box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
  transition: transform 0.2s;
  text-transform: uppercase;
}
.btn-upgrade:hover { transform: scale(1.05); }

/* ==========================================
   INTERFACE ORIGINALE
   ========================================== */
body { font-family: var(--font-ui); background: var(--bg); color: var(--ink); line-height: 1.5; }

.app-header {
  background: linear-gradient(135deg, #0d2d52 0%, #1a4e8c 60%, #2563b8 100%);
  color: #fff; padding: 22px 40px 18px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 20px; box-shadow: 0 4px 24px rgba(10,30,60,.25);
  position: sticky; top: 0; z-index: 100;
}

.app-header h1 { font-family: var(--font-ui); font-size: 22px; color: white !important; margin: 0; }
.app-header-label { font-size: 14px; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; opacity: .65; color: white; }

.app-body { display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 80px); }

.sidebar { background: #fff; border-right: 1px solid var(--line); height: calc(100vh - 80px); position: sticky; top: 80px; overflow: hidden; }

.main { padding: 28px 36px; overflow-y: auto; max-height: calc(100vh - 80px); }

/* Editeur & Cards */
.form-card, .doc-config, .preview-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--line); margin-bottom: 22px; overflow: hidden; }
.form-card-head { background: linear-gradient(90deg,var(--accent) 0%,#2563b8 100%); padding: 12px 22px; display: flex; align-items: center; gap: 10px; color: #fff; font-family: var(--font-serif); }

#editor { min-height: 300px; padding: 12px 14px; outline: none; background: #f8fafc; }
.editor-toolbar { display: flex; flex-wrap: wrap; gap: 3px; padding: 7px 10px; background: #f1f4f8; border-bottom: 1px solid var(--line); }

.tb-btn { padding: 3px 8px; border-radius: 4px; font-size: 12px; }
.btn-generate { display: inline-flex; align-items: center; gap: 8px; padding: 10px 15px; background: #fff; color: var(--accent); border-radius: 6px; font-size: 13px; font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,.15); }
.btn-add { background: var(--accent); color: #fff; padding: 11px 22px; border-radius: 7px; font-weight: 700; }

/* Responsive */
@media (max-width: 919px) { .app-body { display: block; } .sidebar { height: auto; max-height: 40vh; } }
</style>
</head>
<body>

<div id="premium-lock">
  <div class="lock-card">
    <span style="font-size: 60px;">⭐</span>
    <h2>Espace Création Premium</h2>
    <p>Le générateur de documents Word académiques est réservé aux membres abonnés de la plateforme du <strong>Dr KARA-ZAITRI</strong>.</p>
    <a href="https://www.dr-karazaitri-ma.net/compte-dadherent/paiement-dadhesion/" class="btn-upgrade">Activer mon accès Premium</a>
    <div style="margin-top: 25px;">
      <a href="https://www.dr-karazaitri-ma.net/connexion-membres/" style="color: var(--accent); font-weight: 600; text-decoration: none;">Déjà membre ? Se connecter</a>
    </div>
  </div>
</div>

<header class="app-header">
  <div class="app-header-brand">
    <div class="app-header-label">Rédaction académique</div>
    <h1>Générateur de ebook Word</h1>
  </div>
  <div class="header-actions">
    <button class="btn-generate" onclick="generateDocx()" id="btnGenerate" disabled>Générer le .docx</button>
    <button class="btn-generate" style="background:#e2e8f0; color:#475569;" onclick="exportProject()">💾 Sauvegarder</button>
    <button class="btn-generate" style="background:#e2e8f0; color:#475569;" onclick="document.getElementById('importFile').click()">📂 Charger</button>
    <input type="file" id="importFile" style="display:none" onchange="importProject(event)">
  </div>
</header>

<div class="app-body">
  <aside class="sidebar">
    <div class="sidebar-head" style="padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">
      <h2 style="font-size:14px;">Chapitres</h2>
      <button onclick="clearAll()" style="color:red; font-size:11px;">Effacer</button>
    </div>
    <div id="chaptersList" style="padding:10px; font-size:12px;"></div>
  </aside>

  <main class="main">
    <div class="doc-config" style="padding:20px;">
      <label style="font-weight:700; font-size:13px; display:block; margin-bottom:8px;">TITRE DU DOCUMENT</label>
      <input type="text" id="docTitle" placeholder="Ex: Pathologies Utérines" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px;">
    </div>

    <div class="form-card">
      <div class="form-card-head">Nouveau chapitre</div>
      <div style="padding:20px;">
        <input type="text" id="inputTitle" placeholder="Titre du chapitre" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ddd; border-radius:6px;">
        <div class="editor-wrap" style="border:1px solid #ddd; border-radius:6px;">
          <div class="editor-toolbar">
            <button class="tb-btn" onclick="document.execCommand('bold')">G</button>
            <button class="tb-btn" onclick="document.execCommand('italic')">I</button>
            <button class="tb-btn" onclick="document.execCommand('insertUnorderedList')">Liste</button>
          </div>
          <div id="editor" contenteditable="true" data-placeholder="Contenu..."></div>
        </div>
        <button class="btn-add" onclick="addChapter()" style="margin-top:15px; width:100%;">Ajouter le chapitre</button>
      </div>
    </div>
  </main>
</div>

<script>
// --- SÉCURITÉ ---
async function checkAccess() {
  const lock = document.getElementById('premium-lock');
  if (location.hostname === "localhost" || location.hostname === "127.0.0.1") return;
  try {
    const resp = await fetch('https://www.dr-karazaitri-ma.net/wp-json/wp/v2/users/me', { credentials: 'include' });
    if (!resp.ok) lock.style.display = 'flex';
  } catch (e) { lock.style.display = 'flex'; }
}

// --- LOGIQUE GÉNÉRATEUR ---
let chapters = [];

function addChapter() {
  const title = document.getElementById('inputTitle').value;
  const html = document.getElementById('editor').innerHTML;
  if(!title || !html) return alert("Veuillez remplir le titre et le contenu");
  
  chapters.push({title, html});
  document.getElementById('inputTitle').value = "";
  document.getElementById('editor').innerHTML = "";
  updateUI();
}

function updateUI() {
  const list = document.getElementById('chaptersList');
  list.innerHTML = chapters.map((ch, i) => `<div style="padding:8px; border-bottom:1px solid #eee;">${i+1}. ${ch.title}</div>`).join('');
  document.getElementById('btnGenerate').disabled = chapters.length === 0;
}

async function generateDocx() {
  const { Document, Packer, Paragraph, TextRun, HeadingLevel } = window.docx;
  
  const sections = chapters.map(ch => ({
    children: [
      new Paragraph({ text: ch.title, heading: HeadingLevel.HEADING_1 }),
      new Paragraph({ children: [ new TextRun(ch.html.replace(/<[^>]*>/g, '')) ] })
    ]
  }));

  const doc = new Document({ sections });
  const blob = await Packer.toBlob(doc);
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = "ebook-medical.docx";
  a.click();
}

function exportProject() {
  const data = JSON.stringify({title: document.getElementById('docTitle').value, chapters});
  const blob = new Blob([data], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = "projet-ebook.json";
  a.click();
}

function clearAll() { chapters = []; updateUI(); }

document.addEventListener('DOMContentLoaded', checkAccess);
</script>

</body>
</html>
